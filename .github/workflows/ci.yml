name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single postgres, multiple databases — same shape as local docker-compose but
  # collapsed to one service to keep CI fast.
  GLOBAL_DATABASE_URL: postgresql://oat:oat@localhost:5432/oat_global?schema=public
  REGION_US_EAST_1_DATABASE_URL: postgresql://oat:oat@localhost:5432/oat_us_east_1?schema=public
  REGION_EU_WEST_1_DATABASE_URL: postgresql://oat:oat@localhost:5432/oat_eu_west_1?schema=public
  REGION_AP_SOUTHEAST_1_DATABASE_URL: postgresql://oat:oat@localhost:5432/oat_ap_southeast_1?schema=public
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: ci-test-secret-change-me-in-prod-please
  JWT_ACCESS_TTL: 15m
  JWT_REFRESH_TTL: 30d
  BCRYPT_ROUNDS: '4'
  API_PORT: '3001'
  API_URL: http://localhost:3001
  WEB_PORT: '3000'
  WEB_URL: http://localhost:3000
  CORS_ORIGINS: http://localhost:3000
  SOCKETIO_PATH: /realtime
  NODE_ENV: test
  LOG_LEVEL: warn

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @oat/api db:generate
      - run: pnpm -r --if-present lint
      - run: pnpm -r --if-present typecheck

  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: oat
          POSTGRES_PASSWORD: oat
          POSTGRES_DB: oat_global
        options: >-
          --health-cmd "pg_isready -U oat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Create per-region databases
        env:
          PGPASSWORD: oat
        run: |
          for db in oat_us_east_1 oat_eu_west_1 oat_ap_southeast_1; do
            psql -h localhost -U oat -d oat_global -c "CREATE DATABASE $db;"
          done

      - name: Generate Prisma clients
        run: pnpm --filter @oat/api db:generate

      - name: Migrate all datasources
        run: pnpm --filter @oat/api db:migrate

      - name: API unit/integration tests
        run: pnpm --filter @oat/api test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: api-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: oat
          POSTGRES_PASSWORD: oat
          POSTGRES_DB: oat_global
        options: >-
          --health-cmd "pg_isready -U oat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Create per-region databases
        env:
          PGPASSWORD: oat
        run: |
          for db in oat_us_east_1 oat_eu_west_1 oat_ap_southeast_1; do
            psql -h localhost -U oat -d oat_global -c "CREATE DATABASE $db;"
          done

      - name: Prisma generate + migrate + seed
        run: |
          pnpm --filter @oat/api db:generate
          pnpm --filter @oat/api db:migrate
          pnpm --filter @oat/api db:seed

      - name: Build API
        run: pnpm --filter @oat/api build

      - name: Start API
        run: |
          node --env-file=.env apps/api/dist/main.js > /tmp/api.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV
        # envs above already exported; .env isn't required but the flag tolerates missing files.

      - name: Build web
        run: pnpm --filter @oat/web build

      - name: Start web
        run: |
          pnpm --filter @oat/web exec next start -p 3000 > /tmp/web.log 2>&1 &
          echo "WEB_PID=$!" >> $GITHUB_ENV

      - name: Wait for servers
        run: |
          for i in $(seq 1 30); do
            api=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/health || true)
            web=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/login || true)
            echo "attempt $i api=$api web=$web"
            if [ "$api" = "200" ] && [ "$web" = "200" ]; then exit 0; fi
            sleep 2
          done
          echo "servers failed to start"; echo '--- api ---'; tail -n 80 /tmp/api.log; echo '--- web ---'; tail -n 80 /tmp/web.log; exit 1

      - name: Install Playwright browsers
        run: pnpm --filter @oat/web exec playwright install --with-deps chromium

      - name: Run Playwright
        run: pnpm --filter @oat/web exec playwright test

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            apps/web/test-results
            apps/web/playwright-report
            /tmp/api.log
            /tmp/web.log

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - name: Terraform fmt + validate (if present)
        working-directory: .
        run: |
          if [ -d infra/terraform ]; then
            cd infra/terraform
            terraform fmt -check -recursive
            for env in envs/*; do
              if [ -f "$env/main.tf" ]; then
                echo "::group::validate $env"
                (cd "$env" && terraform init -backend=false && terraform validate)
                echo "::endgroup::"
              fi
            done
          else
            echo "no terraform — skipping"
          fi
