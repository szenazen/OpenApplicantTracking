# Local / prod-like edge: one HTTP entry for the web app (design: Web BFF / gateway in front
# of Global Control Plane + Regional services). Monolith = default; account-service = strangler
# for global account, membership, invitations, and read-only platform account list.
#
# Upstreams are set at build time; override in docker-compose if needed.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream monolith {
  server host.docker.internal:3001;
}

upstream account_service {
  server account-service:3010;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 25m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  # Preserve x-account-id for account-service routes
  proxy_pass_request_headers on;

  # Liveness of the gateway itself (not the backends)
  location = /gateway-health {
    default_type text/plain;
    return 200 'ok';
  }

  # Socket.io — always monolith (design: Realtime with regional job data)
  location /realtime {
    proxy_pass http://monolith;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }

  # POST create account (regional + pipeline) — monolith only
  location = /api/accounts {
    proxy_pass http://monolith;
  }

  # Account & membership microservice: current/*, GET by id
  location ~ ^/api/accounts/current(/|$) {
    proxy_pass http://account_service;
  }

  location ~ ^/api/accounts/[^/]+$ {
    proxy_pass http://account_service;
  }

  location /api/invitations {
    proxy_pass http://account_service;
  }

  # GET = account-service; POST create tenant = monolith (regional DB)
  location /api/platform/accounts {
    limit_except POST {
      proxy_pass http://account_service;
    }
    proxy_pass http://monolith;
  }

  # Default: monolith (auth, jobs, candidates, websockets, health, etc.)
  location / {
    proxy_pass http://monolith;
  }
}
