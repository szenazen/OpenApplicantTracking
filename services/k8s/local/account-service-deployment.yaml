apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: oat-dev
  labels:
    app: account-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: oat-account-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3010
          env:
            # Override with ConfigMap/Secret in real clusters.
            - name: GLOBAL_DATABASE_URL
              value: postgresql://oat:oat@host.docker.internal:5432/oat_global?schema=public
            - name: JWT_SECRET
              value: dev-change-me-please-use-32-chars-minimum!!
            - name: ACCOUNT_SERVICE_PORT
              value: "3010"
            - name: NODE_ENV
              value: development
          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: oat-dev
spec:
  selector:
    app: account-service
  ports:
    - port: 3010
      targetPort: 3010
