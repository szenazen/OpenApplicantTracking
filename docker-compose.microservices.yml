# Overlay: run the first extracted microservice alongside existing infra.
#
#   docker compose -f docker-compose.yml -f docker-compose.microservices.yml up -d account-service
#
# Then:
#   curl -s http://localhost:3010/health
#   curl -s http://localhost:3010/api/accounts/<accountId> -H "Authorization: Bearer <jwt>"
#
# The monolith (apps/api) is unchanged; the web app still talks to :3001 by default.
# Use an edge gateway (see services/README.md) when you are ready to strangler-route traffic.

name: oat

services:
  account-service:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    container_name: oat-account-service
    restart: unless-stopped
    environment:
      GLOBAL_DATABASE_URL: postgresql://oat:oat@global-pg:5432/oat_global?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-please-use-32-chars-minimum!!}
      ACCOUNT_SERVICE_PORT: "3010"
      NODE_ENV: development
    ports:
      - "3010:3010"
    depends_on:
      global-pg:
        condition: service_healthy
