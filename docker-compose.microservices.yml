# Microservices + Web BFF overlay (strangler) — see design/ATS-design.drawio.xml
# (Web BFF in front; account + pipeline + auth slices; kafka-ping for async smoke).
#
#   docker compose -f docker-compose.yml -f docker-compose.microservices.yml up -d
#
# Backup API (apps/api) runs in Docker as `backup-api` (internal :3001, host :3101).
# Override BFF with MONOLITH_URL=http://host.docker.internal:3001 if you prefer a host process on :3001 instead.
#
#   export NEXT_PUBLIC_API_URL=http://localhost:3080
#   export API_URL=http://localhost:3080
#   pnpm --filter @oat/web dev
#
# Pipeline: BFF_PIPELINES_TO_SLICE=1 → `/api/pipelines` → pipeline-service (not apps/api).
# Same JWT_SECRET in `.env` as compose. Seed once: `docker compose exec backup-api pnpm exec tsx scripts/seed.ts`
#
# See docs/deployment-modes.md

name: oat

x-backup-api-env: &backup-api-env
  NODE_ENV: production
  USE_PRISMA_DB_PUSH: "1"
  API_PORT: "3001"
  JWT_SECRET: ${JWT_SECRET:-dev-change-me-please-use-32-chars-minimum!!}
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
  JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
  BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
  GLOBAL_DATABASE_URL: postgresql://oat:oat@global-pg:5432/oat_global?schema=public
  REGION_US_EAST_1_DATABASE_URL: postgresql://oat:oat@region-us-east-1-pg:5432/oat_us_east_1?schema=public
  REGION_EU_WEST_1_DATABASE_URL: postgresql://oat:oat@region-eu-west-1-pg:5432/oat_eu_west_1?schema=public
  REGION_AP_SOUTHEAST_1_DATABASE_URL: postgresql://oat:oat@region-ap-southeast-1-pg:5432/oat_ap_southeast_1?schema=public
  REGION_AP_NORTHEAST_1_DATABASE_URL: postgresql://oat:oat@region-ap-northeast-1-pg:5432/oat_ap_northeast_1?schema=public
  REGION_AP_SOUTHEAST_2_DATABASE_URL: postgresql://oat:oat@region-ap-southeast-2-pg:5432/oat_ap_southeast_2?schema=public
  REDIS_URL: redis://redis:6379
  KAFKA_BROKERS: redpanda:9092
  KAFKA_CLIENT_ID: oat-api
  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_BUCKET: oat-uploads
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  S3_FORCE_PATH_STYLE: "true"
  SMTP_HOST: mailhog
  SMTP_PORT: "1025"
  SMTP_FROM: "OpenATS <no-reply@openapplicanttracking.local>"
  CORS_ORIGINS: http://localhost:3002,http://localhost:3000,http://127.0.0.1:3002
  API_URL: http://localhost:3101
  SOCKETIO_PATH: /realtime
  LOG_LEVEL: warn

services:
  backup-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: oat-backup-api
    restart: unless-stopped
    environment:
      <<: *backup-api-env
    ports:
      - "3101:3001"
    depends_on:
      global-pg:
        condition: service_healthy
      region-us-east-1-pg:
        condition: service_healthy
      region-eu-west-1-pg:
        condition: service_healthy
      region-ap-southeast-1-pg:
        condition: service_healthy
      region-ap-northeast-1-pg:
        condition: service_healthy
      region-ap-southeast-2-pg:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redpanda:
        condition: service_started

  account-service:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    container_name: oat-account-service
    restart: unless-stopped
    environment:
      GLOBAL_DATABASE_URL: postgresql://oat:oat@global-pg:5432/oat_global?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-please-use-32-chars-minimum!!}
      ACCOUNT_SERVICE_PORT: "3010"
      NODE_ENV: development
    ports:
      - "3010:3010"
    depends_on:
      global-pg:
        condition: service_healthy

  pipeline-slice-pg:
    image: postgres:16-alpine
    container_name: oat-pipeline-slice-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: oat
      POSTGRES_PASSWORD: oat
      POSTGRES_DB: oat_pipeline_slice
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oat"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports: ["5440:5432"]
    volumes: [pipeline_slice_data:/var/lib/postgresql/data]

  pipeline-service:
    build:
      context: .
      dockerfile: services/pipeline-service/Dockerfile
    container_name: oat-pipeline-service
    restart: unless-stopped
    environment:
      PIPELINE_SLICE_DATABASE_URL: postgresql://oat:oat@pipeline-slice-pg:5432/oat_pipeline_slice?schema=public
      PIPELINE_SERVICE_PORT: "3030"
      # Same secret as monolith + account-service (JWT from browser must validate here).
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-please-use-32-chars-minimum!!}
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "3030:3030"
    depends_on:
      pipeline-slice-pg:
        condition: service_healthy
      redpanda:
        condition: service_started

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: oat-auth-service
    restart: unless-stopped
    environment:
      AUTH_SERVICE_PORT: "3020"
    ports:
      - "3020:3020"

  kafka-ping:
    build:
      context: .
      dockerfile: services/kafka-ping/Dockerfile
    container_name: oat-kafka-ping
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_PING_PORT: "3040"
    ports:
      - "3040:3040"
    depends_on:
      - redpanda

  web-bff:
    build:
      context: .
      dockerfile: services/web-bff/Dockerfile
    container_name: oat-web-bff
    restart: unless-stopped
    environment:
      MONOLITH_URL: http://backup-api:3001
      ACCOUNT_SERVICE_URL: http://account-service:3010
      BFF_PORT: "3080"
      PIPELINE_SLICE_ENABLED: "1"
      AUTH_SLICE_ENABLED: "1"
      # Public /api/pipelines → pipeline-service (same JSON; needs x-account-id on requests).
      BFF_PIPELINES_TO_SLICE: "1"
      PIPELINE_SERVICE_URL: http://pipeline-service:3030
      AUTH_SERVICE_URL: http://auth-service:3020
      KAFKA_PING_URL: http://kafka-ping:3040
    ports:
      - "3080:3080"
    depends_on:
      - backup-api
      - account-service
      - pipeline-service
      - auth-service
      - kafka-ping

volumes:
  pipeline_slice_data:
