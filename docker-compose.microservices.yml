# Microservices + Web BFF overlay (strangler) — see design/ATS-design.drawio.xml
# (Web BFF in front; account + pipeline + auth slices; kafka-ping for async smoke).
#
#   docker compose -f docker-compose.yml -f docker-compose.microservices.yml up -d
#
# Backup API (apps/api) on host :3001 — for unmigrated routes only; primary edge
# is web-bff :3080. Point the browser at :3001 only for monolith-backup mode.
#
#   export NEXT_PUBLIC_API_URL=http://localhost:3080
#   export API_URL=http://localhost:3080
#   pnpm --filter @oat/web dev
#
# Pipeline: BFF_PIPELINES_TO_SLICE=1 → `/api/pipelines` → pipeline-service (not apps/api).
# Same JWT_SECRET in `.env` as compose. Run apps/api on :3001 only for backup routes (jobs, auth, …).
#
# See docs/deployment-modes.md

name: oat

services:
  account-service:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    container_name: oat-account-service
    restart: unless-stopped
    environment:
      GLOBAL_DATABASE_URL: postgresql://oat:oat@global-pg:5432/oat_global?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-please-use-32-chars-minimum!!}
      ACCOUNT_SERVICE_PORT: "3010"
      NODE_ENV: development
    ports:
      - "3010:3010"
    depends_on:
      global-pg:
        condition: service_healthy

  pipeline-slice-pg:
    image: postgres:16-alpine
    container_name: oat-pipeline-slice-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: oat
      POSTGRES_PASSWORD: oat
      POSTGRES_DB: oat_pipeline_slice
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oat"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports: ["5440:5432"]
    volumes: [pipeline_slice_data:/var/lib/postgresql/data]

  pipeline-service:
    build:
      context: .
      dockerfile: services/pipeline-service/Dockerfile
    container_name: oat-pipeline-service
    restart: unless-stopped
    environment:
      PIPELINE_SLICE_DATABASE_URL: postgresql://oat:oat@pipeline-slice-pg:5432/oat_pipeline_slice?schema=public
      PIPELINE_SERVICE_PORT: "3030"
      # Same secret as monolith + account-service (JWT from browser must validate here).
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-please-use-32-chars-minimum!!}
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "3030:3030"
    depends_on:
      pipeline-slice-pg:
        condition: service_healthy
      redpanda:
        condition: service_started

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: oat-auth-service
    restart: unless-stopped
    environment:
      AUTH_SERVICE_PORT: "3020"
    ports:
      - "3020:3020"

  kafka-ping:
    build:
      context: .
      dockerfile: services/kafka-ping/Dockerfile
    container_name: oat-kafka-ping
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_PING_PORT: "3040"
    ports:
      - "3040:3040"
    depends_on:
      - redpanda

  web-bff:
    build:
      context: .
      dockerfile: services/web-bff/Dockerfile
    container_name: oat-web-bff
    restart: unless-stopped
    environment:
      # Backup Nest app (apps/api) — unmigrated routes only; not the primary edge.
      MONOLITH_URL: http://host.docker.internal:3001
      ACCOUNT_SERVICE_URL: http://account-service:3010
      BFF_PORT: "3080"
      PIPELINE_SLICE_ENABLED: "1"
      AUTH_SLICE_ENABLED: "1"
      # Public /api/pipelines → pipeline-service (same JSON; needs x-account-id on requests).
      BFF_PIPELINES_TO_SLICE: "1"
      PIPELINE_SERVICE_URL: http://pipeline-service:3030
      AUTH_SERVICE_URL: http://auth-service:3020
      KAFKA_PING_URL: http://kafka-ping:3040
    ports:
      - "3080:3080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - account-service
      - pipeline-service
      - auth-service
      - kafka-ping

volumes:
  pipeline_slice_data:
