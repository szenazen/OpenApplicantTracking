# Microservices + Web BFF overlay (strangler) — see design/ATS-design.drawio.xml
# (Web BFF in front; account-service + modular monolith @ apps/api).
#
#   docker compose -f docker-compose.yml -f docker-compose.microservices.yml up -d
#
# Then start the monolith on the **host** (expects :3001):
#   pnpm --filter @oat/api dev
#
# Point the web app at the BFF (single entry, prod-like):
#   export NEXT_PUBLIC_API_URL=http://localhost:3080
#   export API_URL=http://localhost:3080
#   pnpm --filter @oat/web dev
#
# Direct account-service (bypass BFF): :3010
# Optional legacy nginx edge: see services/api-gateway/README.md

name: oat

services:
  account-service:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    container_name: oat-account-service
    restart: unless-stopped
    environment:
      GLOBAL_DATABASE_URL: postgresql://oat:oat@global-pg:5432/oat_global?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-please-use-32-chars-minimum!!}
      ACCOUNT_SERVICE_PORT: "3010"
      NODE_ENV: development
    ports:
      - "3010:3010"
    depends_on:
      global-pg:
        condition: service_healthy

  web-bff:
    build:
      context: .
      dockerfile: services/web-bff/Dockerfile
    container_name: oat-web-bff
    restart: unless-stopped
    environment:
      MONOLITH_URL: http://host.docker.internal:3001
      ACCOUNT_SERVICE_URL: http://account-service:3010
      BFF_PORT: "3080"
    ports:
      - "3080:3080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - account-service
